name: Deploy to Dev Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: 架构检查
        run: python3 scripts/check_architecture.py

      - name: Lint 检查
        run: uv run ruff check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/project/chrono
          git stash --include-untracked
          git pull

          CHANGED=$(git diff HEAD~1 --name-only)
          INFRA=$(echo "$CHANGED" | grep -cE 'docker-compose|\.env' || true)
          BE_DEPS=$(echo "$CHANGED" | grep -cE 'pyproject\.toml|uv\.lock|backend/Dockerfile' || true)
          FE_CHANGED=$(echo "$CHANGED" | grep -cE '^frontend/' || true)
          BE_CHANGED=$(echo "$CHANGED" | grep -cE '^backend/' || true)

          if [ "$INFRA" -gt 0 ] || ([ "$BE_DEPS" -gt 0 ] && [ "$FE_CHANGED" -gt 0 ]); then
            echo "▶ Full rebuild"
            docker compose up -d --build
          elif [ "$BE_DEPS" -gt 0 ]; then
            echo "▶ Backend rebuild (deps changed) + frontend restart"
            docker compose up -d --build backend
            docker compose restart frontend
          elif [ "$FE_CHANGED" -gt 0 ] && [ "$BE_CHANGED" -gt 0 ]; then
            echo "▶ Frontend rebuild + backend restart"
            docker compose up -d --build frontend
            docker compose restart backend
          elif [ "$FE_CHANGED" -gt 0 ]; then
            echo "▶ Frontend rebuild only"
            docker compose up -d --build frontend
          elif [ "$BE_CHANGED" -gt 0 ]; then
            echo "▶ Backend restart only"
            docker compose restart backend
          else
            echo "▶ Config/docs only, restart all"
            docker compose restart
          fi

          docker image prune -f
