name: Deploy to Dev Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/project/chrono
          git stash --include-untracked
          git pull
          if git diff HEAD~1 --name-only | grep -qE 'pyproject\.toml|uv\.lock|package\.json|pnpm-lock|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart backend
            docker compose up -d --build frontend
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f
