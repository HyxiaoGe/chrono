services:
  backend:
    build:
      context: ./backend
    container_name: chrono-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - default
      - litellm_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://192.168.1.10:8001/api
        API_BASE_URL: http://chrono-backend:8000/api
    container_name: chrono-frontend
    ports:
      - "3003:3000"
    restart: unless-stopped
    mem_limit: 128m

networks:
  litellm_net:
    external: true
    name: litellm-proxy_default
