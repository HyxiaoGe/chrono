services:
  backend:
    image: ${CHRONO_BACKEND_IMAGE:-chrono-backend:local}
    build:
      context: ./backend
    container_name: chrono-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENABLE_DOCS=false
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - default
      - litellm_net
      - postgres_net
      - middleware_net

  frontend:
    image: ${CHRONO_FRONTEND_IMAGE:-chrono-frontend:local}
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://192.168.1.10:8001/api
        API_BASE_URL: http://chrono-backend:8000/api
    container_name: chrono-frontend
    ports:
      - "3003:3000"
    restart: unless-stopped
    mem_limit: 128m

networks:
  litellm_net:
    external: true
    name: litellm-proxy_default
  postgres_net:
    external: true
    name: postgres_default
  middleware_net:
    external: true
    name: middleware_default
